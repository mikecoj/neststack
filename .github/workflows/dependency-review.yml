name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          allow-licenses: >-
            0BSD, AFL-2.1, Apache-2.0, BSD-2-Clause, BSD-3-Clause,
            BlueOak-1.0.0, CC-BY-4.0, CC0-1.0, ISC, LGPL-3.0-only,
            LGPL-3.0-or-later, MIT, MPL-1.1, MPL-2.0, Python-2.0,
            Unlicense, WTFPL
          comment-summary-in-pr: always
