name: CI

on:
  push:
    branches: [main, 'feat-*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Build, Test & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive NX SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Build affected
        run: pnpm nx affected -t build

      - name: Typecheck affected
        run: pnpm nx affected -t typecheck

      - name: Test affected
        run: pnpm nx affected -t test -- --coverage

      - name: Format check
        run: npx prettier --check .

      - name: Security audit
        run: pnpm audit --audit-level=moderate

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 14
