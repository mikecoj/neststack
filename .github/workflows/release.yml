name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual publishing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Version, Changelog & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint all packages
        run: pnpm nx run-many -t lint

      - name: Build all packages
        run: pnpm nx run-many -t build

      - name: Run all tests
        run: pnpm nx run-many -t test

      - name: Typecheck all packages
        run: pnpm nx run-many -t typecheck

      - name: Security audit
        run: pnpm audit --audit-level=moderate

      - name: Version and changelog (dry run)
        if: inputs.dry-run == 'true'
        run: pnpm nx release --skip-publish --dry-run --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version and changelog
        if: inputs.dry-run != 'true'
        run: pnpm nx release --skip-publish --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push changes and tags
        if: inputs.dry-run != 'true'
        run: git push && git push --tags

      - name: Publish to npm (dry run)
        if: inputs.dry-run == 'true'
        run: pnpm nx release publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish to npm
        if: inputs.dry-run != 'true'
        run: pnpm nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Generate SBOM
        if: inputs.dry-run != 'true'
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          path: packages/advanced-config
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Attest build provenance
        if: inputs.dry-run != 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: packages/advanced-config/dist/**
