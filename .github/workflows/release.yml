name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual publishing)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Version, Changelog & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint all packages
        run: pnpm nx run-many -t lint

      - name: Build all packages
        run: pnpm nx run-many -t build

      - name: Run all tests
        run: pnpm nx run-many -t test

      - name: Typecheck all packages
        run: pnpm nx run-many -t typecheck

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Version and changelog (dry run)
        if: inputs.dry-run == 'true'
        run: pnpm nx release --skip-publish --dry-run --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version and changelog
        if: inputs.dry-run != 'true'
        run: pnpm nx release --skip-publish --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push changes and tags
        if: inputs.dry-run != 'true'
        run: git push && git push --tags

      - name: Publish to npm (dry run)
        if: inputs.dry-run == 'true'
        run: pnpm nx release publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish to npm
        if: inputs.dry-run != 'true'
        run: pnpm nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
